server:
  port: 8081

spring:
  application:
    name: order-service
  kafka:
    # Endereço do broker. Em docker-compose use 'localhost:9092' (host)
    # ou 'kafka:29092' se a aplicação também rodar em container.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Serializa o evento (POJO) para JSON automaticamente.
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # acks=all: o broker só confirma após replicar nas réplicas in-sync.
      # Máxima durabilidade — nenhuma mensagem confirmada é perdida.
      acks: all
      # Reentrega automática em falhas transitórias.
      retries: 3
      properties:
        # Garante ordem mesmo com retries e múltiplas requisições em voo.
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
# Nomes de tópicos centralizados em configuração (evita "magic strings").
app:
  kafka:
    topics:
      orders-created: orders.created